<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e0b1a">
  <meta name="description" content="Tempest — ein Königreich-Builder im Universum von That Time I Got Reincarnated as a Slime.">
  <title>Tempest — Königreich der Monster</title>
  <link rel="icon" href="icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="ruler-mini" type="button" aria-label="Herrscher"></button>
      <div id="resources" aria-label="Ressourcen"></div>
      <button id="watch-toggle" type="button" aria-label="Zuschauer-Modus" title="Zuschauer-Modus starten"></button>
    </header>

    <main id="screen" aria-live="polite"><!-- Inhalt wird per JavaScript gerendert --></main>

    <nav id="tabbar" aria-label="Navigation"><!-- Tabs werden per JavaScript gerendert --></nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-container" aria-live="assertive"></div>

  <!-- Logik (DOM-frei, auch unter Node testbar) -->
  <script src="js/data-tables.js"></script>
  <script src="js/data.js"></script>
  <script src="js/art-data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/systems.js"></script>
  <script src="js/systems-bestiary.js"></script>
  <script src="js/systems-combat.js"></script>
  <script src="js/systems-skirmish.js"></script>
  <script src="js/systems-siege.js"></script>
  <script src="js/systems-battle.js"></script>
  <script src="js/systems-action.js"></script>
  <script src="js/systems-contracts.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/completion-planner.js"></script>
  <!-- Canvas-Darstellung (Logik bleibt im GameSystems-Zustand) -->
  <script src="js/render/canvas-core.js"></script>
  <script src="js/render/effects.js"></script>
  <script src="js/render/battle-scene.js"></script>
  <script src="js/render/adventure-scene.js"></script>
  <script src="js/render/action-scene.js"></script>
  <!-- Darstellung -->
  <script src="js/ui.js"></script>
  <script src="js/ui-adventure.js"></script>
  <script src="js/ui-progress.js"></script>
  <script src="js/ui-contracts.js"></script>
  <script src="js/ui-action.js"></script>
  <script src="js/ui-siege.js"></script>
  <script src="js/ui-battle.js"></script>
  <script src="js/ui-action-combat.js"></script>
  <script src="js/main.js"></script>
  <script>
    // PWA: Service Worker nur unter http(s) registrieren – niemals unter file://
    // (dort nicht unterstützt) und nur, wenn die API vorhanden ist (z. B. nicht in jsdom).
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
